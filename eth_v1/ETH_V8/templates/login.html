<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETH V8 - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
    <div class="bg-gray-800 rounded-xl p-8 w-full max-w-sm shadow-2xl border border-gray-700">
        <h1 class="text-2xl font-bold text-emerald-400 text-center mb-6">ETH V8 Dashboard</h1>
        {% if error %}
        <div class="bg-red-900/50 text-red-300 rounded p-3 mb-4 text-sm text-center">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login">
            <input type="password" name="password" placeholder="Password"
                   class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-emerald-400 mb-4"
                   autofocus>
            <button type="submit"
                    class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-lg transition">
                Login
            </button>
        </form>
    </div>
</body>
</html>
