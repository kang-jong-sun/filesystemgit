<!DOCTYPE html>
<html lang="ko" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ETH V8{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-900 text-gray-100 min-h-full">
    <nav class="bg-gray-800 border-b border-gray-700">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex items-center justify-between h-14">
                <div class="flex items-center space-x-1">
                    <span class="text-lg font-bold text-emerald-400">ETH V8</span>
                    <span id="conn-dot" class="w-2 h-2 rounded-full bg-gray-500 ml-2"></span>
                </div>
                <div class="flex items-center space-x-4 text-sm">
                    <a href="/" class="hover:text-emerald-400 {% block nav_dash %}{% endblock %}">Dashboard</a>
                    <a href="/trades" class="hover:text-emerald-400 {% block nav_trades %}{% endblock %}">Trades</a>
                    <a href="/balance" class="hover:text-emerald-400 {% block nav_balance %}{% endblock %}">Balance</a>
                    <a href="/logout" class="text-gray-400 hover:text-red-400 ml-4">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-gray-600 text-xs py-4">
        ETH/USDT V8 Dual | <span id="footer-uptime"></span>
    </footer>

    {% block scripts %}{% endblock %}

    <script>
    let ws;
    let wsRetry = 1;
    function connectWS() {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${proto}//${location.host}/ws/price`);
        ws.onopen = () => {
            document.getElementById('conn-dot').className = 'w-2 h-2 rounded-full bg-emerald-400 ml-2';
            wsRetry = 1;
        };
        ws.onclose = () => {
            document.getElementById('conn-dot').className = 'w-2 h-2 rounded-full bg-red-400 ml-2';
            setTimeout(connectWS, Math.min(wsRetry * 1000, 30000));
            wsRetry *= 2;
        };
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            updateElements(d);
        };
    }
    function updateElements(d) {
        const map = {
            'live-price': d.price ? `$${d.price.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}` : '',
            'live-balance': d.balance ? `$${d.balance.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}` : '',
            'live-ema250': d.ema250 ? `$${d.ema250.toLocaleString(undefined,{maximumFractionDigits:2})}` : '',
            'live-ema1575': d.ema1575 ? `$${d.ema1575.toLocaleString(undefined,{maximumFractionDigits:2})}` : '',
            'live-ema-status': d.ema_status || '',
            'live-ema-gap': d.ema_gap ? `${d.ema_gap.toFixed(3)}%` : '',
            'live-available': d.available ? `$${d.available.toLocaleString(undefined,{maximumFractionDigits:2})}` : '',
            'live-peak': d.peak_capital ? `$${d.peak_capital.toLocaleString(undefined,{maximumFractionDigits:2})}` : '',
            'live-mdd': d.max_drawdown != null ? `${d.max_drawdown.toFixed(1)}%` : '',
            'live-trades': d.total_trades != null ? d.total_trades : '',
            'live-wr': d.win_rate != null ? `${d.win_rate.toFixed(0)}%` : '',
            'live-pf': d.profit_factor != null ? d.profit_factor.toFixed(2) : '',
            'live-roi': d.roi != null ? `${d.roi >= 0 ? '+' : ''}${d.roi.toFixed(2)}%` : '',
            'live-pnl': d.unrealized_pnl != null ? `$${d.unrealized_pnl >= 0 ? '+' : ''}${d.unrealized_pnl.toLocaleString(undefined,{maximumFractionDigits:2})}` : '',
            'footer-uptime': d.uptime || '',
        };
        for (const [id, val] of Object.entries(map)) {
            const el = document.getElementById(id);
            if (el && val !== '') el.textContent = val;
        }
        // EMA status color
        const esSt = document.getElementById('live-ema-status');
        if (esSt) esSt.className = d.ema_status === 'BULL' ? 'text-emerald-400 font-bold' : 'text-red-400 font-bold';
        // ROI color
        const roiEl = document.getElementById('live-roi');
        if (roiEl && d.roi != null) roiEl.className = d.roi >= 0 ? 'text-emerald-400 text-2xl font-bold' : 'text-red-400 text-2xl font-bold';
        // PnL color
        const pnlEl = document.getElementById('live-pnl');
        if (pnlEl && d.unrealized_pnl != null) pnlEl.className = d.unrealized_pnl >= 0 ? 'text-emerald-400' : 'text-red-400';
    }
    if (document.getElementById('live-price')) connectWS();
    </script>
</body>
</html>
